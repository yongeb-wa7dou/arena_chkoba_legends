<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena Chkoba - Qahwa</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Cairo', sans-serif; }
.bg-qahwa { background: linear-gradient(135deg, #0a2f1f 0%, #1a4d2e 100%); }
.card { transition: all 0.2s ease; }
.card:active { transform: scale(0.95) translateY(4px); }
    @keyframes chkoba { 0% {transform:scale(1)} 50% {transform:scale(1.3)} 100% {transform:scale(1)} }
.chkoba-anim { animation: chkoba 0.6s ease; }
  </style>
</head>
<body class="bg-qahwa text-white">
  <div id="root"></div>
  <script type="module" src="./app.jsx"></script>
</body>
</html>
